<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Form</title>
  </head>
  <body>
    <h2>User Form</h2>
    <form action="https://api.web3forms.com/submit" method="POST" id="form">
      <input type="text" name="Name" placeholder="Name" id="Name" required />
      <br /><br />
      <input type="email" name="Email" id="Email" placeholder="Email" />
      <br /><br />
      <input
        type="number"
        name="Phone_Number"
        id="Phone_Number"
        placeholder="Phone_Number"
        required
      />
      <br /><br />

      <input type="hidden" name="form_name" value="Contact Details" />

      <input type="hidden" name="subject" value="Spinel Distribution" />

      <input
        type="hidden"
        name="redirect"
        value="https://timmypatrick.github.io/spineldistribution/contact_greetings.html"
      />

      <input
        type="hidden"
        name="access_key"
        value="1175cfcf-9915-4426-b9f3-844b0d2bf8ff"
      />
      <button>Submit</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
      const SUPABASE_URL = "https://yyumrepmcmvdwzhzcreo.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5dW1yZXBtY212ZHd6aHpjcmVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzIwMjgsImV4cCI6MjA4ODkwODAyOH0.Cu-rP4n_5Y3cPFoomNMrdyaMeTO4btJjNtOlgiIferc";

      const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      document
        .getElementById("form")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const Name = document.getElementById("Name").value;
          const Email = document.getElementById("Email").value;
          const Phone_Number = document.getElementById("Phone_Number").value;

          await client
            .from("Contact")
            .insert([{ Name: Name, Email: Email, Phone_Number: Phone_Number }]);

          //   const data = await client.from("Contact").insert([
          //     {

        });
    </script>
  </body>
</html>
